<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Xaminator</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <span class="logo-mark">📋</span>
      <h1>Xaminator</h1>
      <p>Exam Seat Arrangement System</p>
    </div>

    <form id="login-form" autocomplete="on" novalidate>
      <div id="login-error" class="login-error" role="alert"></div>

      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="admin"
               autocomplete="username" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••"
               autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="login-btn">
        Login
      </button>
    </form>

    <p class="text-muted mt-4" style="text-align:center;">
      Xaminator v1.0 &nbsp;·&nbsp; Admin Panel
    </p>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirect to dashboard if already logged in
    if (AuthAPI.isAuthenticated()) {
      location.replace('dashboard.html');
    }

    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('login-error');
      const loginBtn = document.getElementById('login-btn');

      errEl.style.display = 'none';
      errEl.textContent   = '';

      if (!username || !password) {
        errEl.textContent   = 'Please enter both username and password.';
        errEl.style.display = 'block';
        return;
      }

      // Disable button and show loading state
      loginBtn.disabled = true;
      const originalText = loginBtn.innerHTML;
      loginBtn.innerHTML = 'Logging in...';

      try {
        await AuthAPI.login(username, password);
        location.href = 'dashboard.html';
      } catch (error) {
        errEl.textContent = error.message || 'Invalid credentials. Please try again.';
        errEl.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = originalText;
      }
    });
  </script>

</body>
</html>
