<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students — Xaminator</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app-layout">

  <!-- ===================== Sidebar ===================== -->
  <nav class="sidebar" aria-label="Main navigation">
    <div class="sidebar-logo">
      <span class="logo-icon">📋</span>
      <span class="logo-text">Xaminator</span>
    </div>
    <ul class="nav-links">
      <li><a href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a></li>
      <li><a href="students.html"><span class="nav-icon">👥</span> Students</a></li>
      <li><a href="halls.html"   ><span class="nav-icon">🏛️</span> Exam Halls</a></li>
      <li><a href="exams.html"   ><span class="nav-icon">📝</span> Exams</a></li>
      <li><a href="seating.html" ><span class="nav-icon">💺</span> Seating</a></li>
    </ul>
    <div class="sidebar-footer">
      <a href="index.html" class="logout-btn" id="logout-btn"><span>🚪</span> Logout</a>
    </div>
  </nav>

  <!-- ===================== Main ===================== -->
  <div class="main-content">

    <div class="page-header">
      <div>
        <h1>Students</h1>
        <p>Add and manage student records</p>
      </div>
    </div>

    <div class="page-body">
      <div class="two-col">

        <!-- Add Student Form -->
        <div class="card">
          <div class="card-header">➕ Add Student</div>
          <div class="card-body">
            <form id="add-student-form" novalidate>

              <div class="form-group">
                <label for="student-reg">Register Number *</label>
                <input id="student-reg" type="text" placeholder="e.g. CSE2024001"
                       maxlength="20" style="text-transform:uppercase;">
              </div>

              <div class="form-group">
                <label for="student-name">Full Name *</label>
                <input id="student-name" type="text" placeholder="e.g. John Doe">
              </div>

              <div class="form-group">
                <label for="student-email">Email (optional)</label>
                <input id="student-email" type="email" placeholder="e.g. john@college.edu">
              </div>

              <div class="form-group">
                <label for="student-dept">Department *</label>
                <select id="student-dept">
                  <option value="">— Select Department —</option>
                </select>
              </div>

              <div class="form-group">
                <label for="student-sem">Semester *</label>
                <input id="student-sem" type="number" placeholder="1–12" min="1" max="12">
              </div>

              <button type="submit" class="btn btn-primary btn-full">
                Add Student
              </button>

            </form>
          </div>
        </div>

        <!-- Students Table -->
        <div class="card">
          <div class="card-header flex-between">
            <span>👥 All Students</span>
          </div>
          <div class="card-body" style="padding-bottom:0;">
            <div class="search-bar">
              <input id="student-search" type="search"
                     placeholder="🔍  Search by name or register number…"
                     autocomplete="off">
            </div>
          </div>
          <div class="table-wrapper">
            <table id="students-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Register No.</th>
                  <th>Full Name</th>
                  <th>Email</th>
                  <th>Department</th>
                  <th>Semester</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr class="loading-row">
                  <td colspan="7"><span class="spinner spinner-dark"></span> Loading…</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div><!-- /two-col -->
    </div><!-- /page-body -->
  </div><!-- /main-content -->
</div><!-- /app-layout -->

<div id="toast-container" aria-live="polite"></div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/students.js"></script>
<script>
  if (sessionStorage.getItem('xaminator_auth') !== '1') location.replace('index.html');
  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.removeItem('xaminator_auth');
  });
</script>
</body>
</html>
