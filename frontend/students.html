<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students — Xaminator</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app-layout">

  <!-- ===================== Sidebar ===================== -->
  <nav class="sidebar" aria-label="Main navigation">
    <div class="sidebar-logo">
      <span class="logo-icon">📋</span>
      <span class="logo-text">Xaminator</span>
    </div>
    <ul class="nav-links">
      <li><a href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a></li>
      <li><a href="students.html"><span class="nav-icon">👥</span> Students</a></li>
      <li><a href="halls.html"   ><span class="nav-icon">🏛️</span> Exam Halls</a></li>
      <li><a href="exams.html"   ><span class="nav-icon">📝</span> Exams</a></li>
      <li><a href="seating.html" ><span class="nav-icon">💺</span> Seating</a></li>
      <li><a href="arrange.html" ><span class="nav-icon">🧙</span> Arrange Exam</a></li>
    </ul>
    <div class="sidebar-footer">
      <a href="index.html" class="logout-btn" id="logout-btn"><span>🚪</span> Logout</a>
    </div>
  </nav>

  <!-- ===================== Main ===================== -->
  <div class="main-content">

    <div class="page-header">
      <div>
        <h1>Students</h1>
        <p>Add and manage student records</p>
      </div>
    </div>

    <div class="page-body">
      <div class="two-col">

        <!-- Add Student Form -->
        <div class="card">
          <div class="card-header">➕ Add Student</div>
          <div class="card-body">
            <form id="add-student-form" novalidate>

              <div class="form-group">
                <label for="student-reg">Register Number *</label>
                <input id="student-reg" type="text" placeholder="e.g. CSE2024001"
                       maxlength="20" style="text-transform:uppercase;">
              </div>

              <div class="form-group">
                <label for="student-name">Full Name *</label>
                <input id="student-name" type="text" placeholder="e.g. John Doe">
              </div>

              <div class="form-group">
                <label for="student-email">Email (optional)</label>
                <input id="student-email" type="email" placeholder="e.g. john@college.edu">
              </div>

              <div class="form-group">
                <label for="student-dept">Department *</label>
                <select id="student-dept">
                  <option value="">— Select Department —</option>
                </select>
              </div>

              <div class="form-group">
                <label for="student-sem">Semester *</label>
                <input id="student-sem" type="number" placeholder="1–12" min="1" max="12">
              </div>

              <button type="submit" class="btn btn-primary btn-full">
                Add Student
              </button>

            </form>

            <!-- Bulk Upload Panel -->
            <div class="upload-panel" id="student-upload-panel">
              <div class="upload-panel-header" onclick="toggleUploadPanel('student-upload-panel')">
                <h4>📤 Bulk Import</h4>
                <span class="toggle-icon">▼</span>
              </div>
              <div class="upload-panel-body">
                <div class="upload-actions">
                  <button type="button" class="btn btn-secondary btn-sm" onclick="StudentAPI.downloadTemplate()">
                    📥 Download Template
                  </button>
                </div>
                <div class="file-input-wrapper">
                  <input type="file" id="student-file-input" accept=".csv,.xlsx">
                  <label for="student-file-input" class="file-input-label" id="student-file-label">
                    📁 Choose CSV or Excel file
                  </label>
                </div>
                <div class="selected-file" id="student-selected-file"></div>
                
                <div class="duplicate-options" style="margin-top: 12px;">
                  <label>When duplicate register numbers are found:</label>
                  <div class="radio-group">
                    <label>
                      <input type="radio" name="student-duplicate" value="skip" checked>
                      Skip duplicates
                    </label>
                    <label>
                      <input type="radio" name="student-duplicate" value="update">
                      Update existing
                    </label>
                  </div>
                </div>
                
                <button type="button" class="btn btn-primary btn-sm btn-full" id="student-upload-btn" disabled onclick="uploadStudents()">
                  Upload Students
                </button>
                
                <div id="student-upload-result"></div>
              </div>
            </div>

          </div>
        </div>

        <!-- Students Table -->
        <div class="card">
          <div class="card-header flex-between">
            <span>👥 All Students</span>
          </div>
          <div class="card-body" style="padding-bottom:0;">
            <div class="search-bar">
              <input id="student-search" type="search"
                     placeholder="🔍  Search by name or register number…"
                     autocomplete="off">
            </div>
          </div>
          <div class="table-wrapper">
            <table id="students-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Register No.</th>
                  <th>Full Name</th>
                  <th>Email</th>
                  <th>Department</th>
                  <th>Semester</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr class="loading-row">
                  <td colspan="7"><span class="spinner spinner-dark"></span> Loading…</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div><!-- /two-col -->
    </div><!-- /page-body -->
  </div><!-- /main-content -->
</div><!-- /app-layout -->

<div id="toast-container" aria-live="polite"></div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
  if (!requireAuth()) throw new Error('Not authenticated');
  
  // Toggle upload panel
  function toggleUploadPanel(panelId) {
    const panel = document.getElementById(panelId);
    panel.classList.toggle('collapsed');
  }
  
  // File input handling
  document.getElementById('student-file-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const label = document.getElementById('student-file-label');
    const selectedFile = document.getElementById('student-selected-file');
    const uploadBtn = document.getElementById('student-upload-btn');
    
    if (file) {
      label.classList.add('has-file');
      label.innerHTML = '✅ File selected';
      selectedFile.textContent = file.name;
      uploadBtn.disabled = false;
    } else {
      label.classList.remove('has-file');
      label.innerHTML = '📁 Choose CSV or Excel file';
      selectedFile.textContent = '';
      uploadBtn.disabled = true;
    }
  });
  
  // Upload students
  async function uploadStudents() {
    const fileInput = document.getElementById('student-file-input');
    const file = fileInput.files[0];
    if (!file) return;
    
    const onDuplicate = document.querySelector('input[name="student-duplicate"]:checked').value;
    const uploadBtn = document.getElementById('student-upload-btn');
    const resultDiv = document.getElementById('student-upload-result');
    
    setButtonLoading(uploadBtn, true);
    resultDiv.innerHTML = '';
    
    try {
      const result = await StudentAPI.bulkUpload(file, onDuplicate);
      
      let html = '<div class="upload-result success">';
      html += '<div class="upload-result-summary">';
      html += `<span>Inserted: ${result.inserted}</span>`;
      html += `<span>Updated: ${result.updated}</span>`;
      html += `<span>Skipped: ${result.skipped}</span>`;
      html += '</div>';
      
      if (result.errors && result.errors.length > 0) {
        html += '<div class="upload-errors">';
        html += `<strong>${result.errors.length} errors:</strong>`;
        html += '<ul>';
        result.errors.slice(0, 10).forEach(err => {
          html += `<li>Row ${err.row}: ${err.field} - ${err.message}</li>`;
        });
        if (result.errors.length > 10) {
          html += `<li>...and ${result.errors.length - 10} more errors</li>`;
        }
        html += '</ul></div>';
      }
      html += '</div>';
      
      resultDiv.innerHTML = html;
      showToast(`Imported ${result.inserted} students successfully!`, 'success');
      
      // Refresh the table
      loadStudents();
      
      // Reset file input
      fileInput.value = '';
      document.getElementById('student-file-label').classList.remove('has-file');
      document.getElementById('student-file-label').innerHTML = '📁 Choose CSV or Excel file';
      document.getElementById('student-selected-file').textContent = '';
      uploadBtn.disabled = true;
      
    } catch (err) {
      resultDiv.innerHTML = `<div class="upload-result error">Upload failed: ${err.message}</div>`;
      showToast('Upload failed: ' + err.message, 'error');
    } finally {
      setButtonLoading(uploadBtn, false);
    }
  }
</script>
<script src="js/students.js"></script>
</body>
</html>
